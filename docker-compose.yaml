name: "rentelektro"

include:
  - ./backend_rentelektro/docker-compose.yaml
  - ./frontend_rentelektro/docker-compose.yaml

services:
  nginx:
    image: nginx:latest
    restart: on-failure
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
      - frontend
    networks:
      - app-network
      - api-network
      - rentelektro-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    networks:
      - rentelektro-network
      - api-network

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./backend_rentelektro/prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - rentelektro-network
      - api-network

  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:latest
    command:
      - --nginx.scrape-uri=http://nginx:80/stub_status
    ports:
      - "9113:9113"
    depends_on:
      - nginx
    networks:
      - rentelektro-network
      - api-network

networks:
  app-network:
    driver: bridge
  api-network:
    driver: bridge
  postgres-network:
    driver: bridge
  rentelektro-network:
    driver: bridge
