services:
  backend:
    build: .
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - envs/config.dev.env
      - envs/postgres.dev.env
    environment:
      - DEBUG=true
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      - postgres
      - redis
    volumes:
      - .:/app
    develop:
      watch:
        - action: sync
          path: .
          target: /app
          ignore:
            - .venv/
            - __pycache__/
            - .pytest_cache/
            - .ruff_cache/
        - action: rebuild
          path: pyproject.toml
        - action: rebuild
          path: Dockerfile
    networks:
      - api-network
      - postgres-network
      - redis-network
      - rentelektro-network

  postgres:
    image: postgres:17
    env_file:
      - envs/postgres.dev.env
    ports:
      - "5432:5432"
    networks:
      - postgres-network
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - redis-network

  tests:
    build: .
    command: [ "sh", "-c", "sleep 5 && poetry run pytest" ]
    env_file:
      - envs/config.dev.env
      - envs/postgres.dev.env
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
    depends_on:
      - backend
    volumes:
      - .:/app
    networks:
      - api-network
      - postgres-network
      - redis-network

volumes:
  redis-data:
  postgres-data:

networks:
  api-network:
    driver: bridge
  postgres-network:
    driver: bridge
  redis-network:
    driver: bridge
  rentelektro-network:
    driver: bridge
